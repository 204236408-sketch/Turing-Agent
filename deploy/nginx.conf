server {
    listen 80;
    server_name _;

    root /opt/turing408/frontend;
    index version-b.html;

    location / {
        try_files $uri $uri/ /version-b.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

