services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: turing408
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file:
      - ../backend/.env
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      - mysql

volumes:
  mysql_data:

