<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>笔记分享 - 408 AI 学习助手</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#0f1f3d 0%,#1d3473 100%);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;color:#fff}
.share-wrap{max-width:560px;width:100%}
.share-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center;color:rgba(255,255,255,.85);font-size:13px;font-weight:600;letter-spacing:1px}
.share-logo span.emoji{font-size:24px}
.share-card{background:#fff;color:#1f2937;border-radius:18px;padding:32px;box-shadow:0 30px 80px rgba(0,0,0,.35);position:relative;overflow:hidden}
.share-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#3b82f6,#8b5cf6)}
.share-title{font-size:22px;font-weight:800;line-height:1.4;margin-bottom:14px;color:#0f172a}
.share-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.share-tag{background:#eff6ff;color:#1d4ed8;font-size:11px;font-weight:600;padding:5px 12px;border-radius:99px}
.share-tag.chapter{background:#fef3c7;color:#b45309}
.share-tag.kp{background:#dcfce7;color:#166534}
.share-summary{font-size:14px;line-height:1.8;color:#475569;background:#f8fafc;border-left:3px solid #3b82f6;padding:14px 18px;border-radius:8px;margin-bottom:18px;white-space:pre-wrap;word-break:break-word;max-height:340px;overflow-y:auto}
.share-footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#94a3b8;padding-top:14px;border-top:1px dashed #e2e8f0}
.share-author{font-weight:700;color:#1e40af}
.share-qr{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc;border-radius:12px;padding:14px;margin-bottom:18px;text-align:center}
.share-qr .qr-box{width:120px;height:120px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#64748b;position:relative;overflow:hidden}
.share-qr .qr-box::before{content:"";position:absolute;inset:8px;background:repeating-linear-gradient(0deg,#0f172a 0 4px,transparent 4px 8px),repeating-linear-gradient(90deg,#0f172a 0 4px,transparent 4px 8px);border-radius:4px;opacity:.85}
.share-qr small{font-size:10px;color:#64748b;margin-top:6px}
.share-actions{display:flex;gap:10px;margin-top:20px}
.share-btn{flex:1;border:0;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s}
.share-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.15)}
.share-btn.primary{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff}
.share-btn.ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}
.share-loading{text-align:center;padding:60px 0;color:rgba(255,255,255,.7);font-size:13px}
.share-error{background:#fee2e2;color:#991b1b;padding:14px 18px;border-radius:10px;font-size:13px;text-align:center}
</style>
</head>
<body>
<div class="share-wrap">
<div class="share-logo"><span class="emoji">🎓</span><span>408 AI 学习助手 · 笔记分享</span></div>
<div id="shareContent"><div class="share-loading">正在加载笔记内容…</div></div>
</div>
<script>
const params=new URLSearchParams(location.search);
const shareId=params.get("share_id");

async function loadShare(){
 const box=document.getElementById("shareContent");
 if(!shareId){box.innerHTML='<div class="share-error">分享链接无效</div>';return}
 try{
  const token=localStorage.getItem("turing408_token")||"";
  const res=await fetch(`/api/notes/share/${shareId}`,{headers:{Authorization:`Bearer ${token}`}});
  const json=await res.json();
  if(!res.ok||!json.data)throw new Error(json.message||"分享不存在");
  const s=json.data.share;
  const n=s.note||{};
  const shareUrl=location.href;
  box.innerHTML=`
   <div class="share-card">
    <div class="share-title">${escapeHtml(s.title||n.title||"未命名笔记")}</div>
    <div class="share-meta">
     ${n.subject?`<span class="share-tag">📚 ${escapeHtml(n.subject)}</span>`:""}
     ${n.chapter?`<span class="share-tag chapter">📖 ${escapeHtml(n.chapter)}</span>`:""}
     ${n.knowledge_point?`<span class="share-tag kp">🎯 ${escapeHtml(n.knowledge_point)}</span>`:""}
    </div>
    <div class="share-qr"><div class="qr-box"></div><small>扫码查看此分享</small></div>
    <div class="share-summary">${escapeHtml(n.content||s.summary||"")}</div>
    <div class="share-footer"><span class="share-author">@ ${escapeHtml(s.author||"408 同学")}</span><span>${escapeHtml(s.create_time||"")}</span></div>
    <div class="share-actions">
     <button class="share-btn ghost" onclick="navigator.clipboard?.writeText('${shareUrl}').then(()=>alert('链接已复制'))">复制链接</button>
     <button class="share-btn primary" onclick="window.close()||history.back()">返回</button>
    </div>
   </div>
  `;
 }catch(e){
  box.innerHTML=`<div class="share-card"><div class="share-error">笔记加载失败：${escapeHtml(e.message||"")}</div></div>`;
 }
}
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c])}
loadShare();
</script>
</body>
</html>
