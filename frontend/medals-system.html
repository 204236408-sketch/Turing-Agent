<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#fafbfc" />
<title>我的勋章 · Hall of Honors</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
  /* =========================================================
     Design tokens — modern, neutral, no warm tones
     ========================================================= */
  :root {
    --bg: #fafbfc;
    --bg-tint: #f3f5f8;
    --paper: #ffffff;
    --ink: #1a1d24;
    --ink-soft: #5a6270;
    --ink-mute: #9ca3ad;
    --line: #e8eaed;
    --line-strong: #d1d5db;
    --shadow-sm: 0 1px 2px rgba(20, 20, 30, 0.04), 0 1px 3px rgba(20, 20, 30, 0.06);
    --shadow-md: 0 4px 12px rgba(20, 20, 30, 0.06), 0 2px 4px rgba(20, 20, 30, 0.04);
    --shadow-lg: 0 20px 50px rgba(20, 20, 30, 0.12), 0 8px 20px rgba(20, 20, 30, 0.06);
    --accent: #ff4d6d;          /* fresh coral */
    --accent-2: #4f7cff;        /* cool blue */
    --ease: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-soft: cubic-bezier(0.22, 1, 0.36, 1);
  }
  html { color-scheme: light; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: auto; overflow: hidden; }
  body {
    font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: var(--ink);
    background: transparent;
    min-height: 0;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font: inherit; color: inherit; cursor: pointer; border: 0; background: none; }
  h1, h2, h3 { margin: 0; font-weight: 700; }
  p { margin: 0; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: #fff; }

  /* Skip link */
  .skip-link {
    position: absolute; top: -40px; left: 16px; z-index: 200;
    background: var(--ink); color: var(--paper); padding: 8px 14px; border-radius: 8px;
    font-weight: 600; transition: top 200ms var(--ease-soft);
  }
  .skip-link:focus { top: 16px; outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Background — subtle floating blobs (cool tones) */
  .bg { position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background:
      radial-gradient(900px 700px at 100% -10%, rgba(79, 124, 255, 0.08), transparent 60%),
      radial-gradient(800px 700px at -10% 110%, rgba(255, 77, 109, 0.06), transparent 60%),
      linear-gradient(180deg, #fafbfc 0%, #f3f5f8 100%);
  }
  .floating { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
  .floating span {
    position: absolute; font-family: "Caveat", cursive; color: var(--ink-mute);
    font-size: 28px; font-weight: 500; opacity: 0.10;
    animation: floatUp 28s linear infinite;
  }
  .floating span:nth-child(1) { left: 6%;  font-size: 36px; animation-delay: 0s;   animation-duration: 30s; }
  .floating span:nth-child(2) { left: 18%; font-size: 22px; animation-delay: -5s;  animation-duration: 34s; }
  .floating span:nth-child(3) { left: 32%; font-size: 30px; animation-delay: -10s; animation-duration: 32s; }
  .floating span:nth-child(4) { left: 48%; font-size: 24px; animation-delay: -15s; animation-duration: 36s; }
  .floating span:nth-child(5) { left: 62%; font-size: 32px; animation-delay: -8s;  animation-duration: 31s; }
  .floating span:nth-child(6) { left: 76%; font-size: 22px; animation-delay: -20s; animation-duration: 35s; }
  .floating span:nth-child(7) { left: 88%; font-size: 28px; animation-delay: -3s;  animation-duration: 33s; }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(-8deg); opacity: 0; }
    8%   { opacity: 0.10; }
    92%  { opacity: 0.10; }
    100% { transform: translateY(-120px) rotate(8deg); opacity: 0; }
  }

  /* =========================================================
     Layout
     ========================================================= */
  .shell { max-width: 100%; height: 315px; margin: 0 auto; padding: 0 8px 0; overflow: hidden; }
  .header { display: none; }
  .header-left { display: flex; flex-direction: column; gap: 10px; }
  .eyebrow {
    color: var(--ink-soft); font-size: 12px; letter-spacing: 0.20em; text-transform: uppercase; font-weight: 700;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .eyebrow::before { content: ""; width: 8px; height: 8px; border-radius: 999px; background: var(--accent); }
  .title {
    font-size: clamp(34px, 4.4vw, 44px);
    line-height: 1.1; font-weight: 800; letter-spacing: -0.02em;
    color: var(--ink);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .title .count {
    display: inline-flex; align-items: center;
    padding: 6px 16px;
    background: var(--ink); color: #fff;
    border-radius: 999px;
    font-size: 0.45em; font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .subtitle { color: var(--ink-soft); font-size: 14.5px; margin-top: 4px; font-weight: 400; }
  .subtitle .hand { font-family: "Caveat", cursive; font-size: 18px; color: var(--accent); }

  /* =========================================================
     Stats — clean cards, subtle shadow
     ========================================================= */
  .stats { display: none; }
  .stat {
    position: relative; padding: 20px 22px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow-sm);
    transition: transform 200ms var(--ease-soft), box-shadow 200ms var(--ease-soft);
  }
  .stat:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .stat .label {
    color: var(--ink-soft); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
  }
  .stat .value {
    font-size: 26px; font-weight: 700; margin-top: 8px; line-height: 1.1;
    font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
  }
  .stat .value .unit { color: var(--ink-mute); font-size: 14px; font-weight: 500; margin-left: 4px; }
  .stat .glyph {
    position: absolute; top: 18px; right: 18px;
    width: 34px; height: 34px; border-radius: 10px;
    display: grid; place-items: center; font-size: 16px; font-weight: 700;
    color: #fff;
  }
  .stat .glyph.s1 { background: linear-gradient(135deg, #ff7a8e, #ff4d6d); }
  .stat .glyph.s2 { background: linear-gradient(135deg, #ffba5a, #ff9a3d); }
  .stat .glyph.s3 { background: linear-gradient(135deg, #6e8aff, #4f7cff); }
  .stat .glyph.s4 { background: linear-gradient(135deg, #b185ff, #8a5cf5); }

  /* =========================================================
     Toolbar
     ========================================================= */
  .toolbar { display: none; }
  .tabs { display: inline-flex; gap: 6px; flex-wrap: wrap; padding: 5px; background: var(--bg-tint); border-radius: 999px; }
  .tab {
    padding: 8px 18px; color: var(--ink-soft); font-size: 13px; font-weight: 600;
    background: transparent; border-radius: 999px;
    transition: background 200ms var(--ease-soft), color 200ms var(--ease-soft);
  }
  .tab:hover { color: var(--ink); }
  .tab[aria-selected="true"] { background: var(--ink); color: #fff; }
  .tab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .search { position: relative; flex: 0 1 260px; }
  .search input {
    width: 100%; padding: 10px 14px 10px 38px;
    background: var(--paper); border: 1px solid var(--line); border-radius: 999px;
    color: var(--ink); font-size: 13.5px; font-weight: 500;
    box-shadow: var(--shadow-sm);
    transition: border-color 200ms var(--ease-soft), box-shadow 200ms var(--ease-soft);
  }
  .search input::placeholder { color: var(--ink-mute); }
  .search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.12); }
  .search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--ink-mute); }

  /* =========================================================
     Grid
     ========================================================= */
  .grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); grid-template-rows: repeat(2, 1fr); gap: 6px 4px; height: 315px; overflow: hidden; }
  .card {
    position: relative;
    padding: 1px 3px 3px;
    text-align: center;
    background: transparent;
    cursor: pointer;
    transition: transform 360ms var(--ease-soft);
  }
  .card:hover { transform: translateY(-4px); }
  .card:hover .medal-wrap { animation: hoverFloat 1.6s var(--ease-soft) infinite; }
  .card:hover .medal-svg { animation: tilt 1.4s ease-in-out infinite; }
  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 12px; }
  .card[data-locked="true"] { cursor: not-allowed; }
  .card[data-locked="true"]:hover { transform: none; }
  .card[data-locked="true"]:hover .medal-svg { animation: none; }
  .card[data-locked="true"] .medal-wrap { filter: grayscale(0.95) opacity(0.40); }
  .card[data-locked="true"] .name { color: var(--ink-mute); }
  @keyframes tilt {
    0%, 100% { transform: rotate(-3deg); }
    50%      { transform: rotate(3deg); }
  }
  @keyframes hoverFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  /* =========================================================
     Medal — uniform hex frame, diverse icons inside
     ========================================================= */
  .medal-wrap {
    position: relative; width: 76px; height: 88px; margin: 0 auto 1px;
    filter: drop-shadow(0 8px 16px rgba(20, 20, 30, 0.08));
  }
  .medal-svg { width: 100%; height: 100%; display: block; }

  .name {
    font-size: 11px; font-weight: 700; color: var(--ink);
    letter-spacing: 0.01em;
  }
  .date {
    color: var(--ink-soft); font-size: 8px; margin-top: 1px;
    font-variant-numeric: tabular-nums; font-weight: 500;
  }
  .progress-row { margin-top: 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; width: 100%; }
  .progress-text { font-size: 9px; color: var(--ink-soft); font-weight: 600; font-variant-numeric: tabular-nums; text-align:center; width:100%; }
  .progress-text .cur { color: var(--ink); font-weight: 700; }
  .progress-text .slash { color: var(--ink-mute); margin: 0 3px; }
  .medal-rule { width: 100%; max-width: 100px; margin: 1px auto 0; color: var(--ink-soft); font-size: 8px; line-height: 1.18; min-height: 20px; }

  /* Empty state */
  .empty { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--ink-mute); text-align: center; }
  .empty[data-show="true"] { display: flex; }

  /* =========================================================
     Modal
     ========================================================= */
  .modal-root { position: fixed; inset: 0; z-index: 50; display: none; touch-action: manipulation; }
  .modal-root[data-open="true"] { display: block; }
  .scrim {
    position: absolute; inset: 0;
    background: rgba(20, 20, 30, 0.45);
    backdrop-filter: blur(8px);
    opacity: 0; transition: opacity 320ms var(--ease-soft);
  }
  .modal-root[data-open="true"] .scrim { opacity: 1; }
  .modal {
    position: absolute; left: 50%; top: 50%;
    width: min(540px, calc(100vw - 32px));
    max-height: calc(100vh - 64px); overflow: hidden;
    background: var(--paper);
    border-radius: 24px;
    padding: 34px 34px 26px;
    box-shadow: var(--shadow-lg);
    transform: translate(-50%, -50%) scale(0.94);
    opacity: 0;
    transition: transform 480ms var(--ease), opacity 320ms var(--ease-soft);
    overscroll-behavior: contain;
  }
  .modal-root[data-open="true"] .modal { transform: translate(-50%, -50%) scale(1); opacity: 1; }

  .medal-stage { position: relative; width: 170px; height: 196px; margin: 10px auto 14px; filter: drop-shadow(0 12px 24px rgba(20, 20, 30, 0.10)); }
  .medal-stage .medal-svg {
    animation: medalEnter 800ms var(--ease) 120ms backwards, medalFloat 5s var(--ease-soft) 1.1s infinite;
  }
  @keyframes medalEnter {
    0%   { transform: scale(0.7) translateY(14px) rotate(-6deg); opacity: 0; }
    100% { transform: scale(1)   translateY(0)    rotate(0);    opacity: 1; }
  }
  @keyframes medalFloat {
    0%, 100% { transform: translateY(0)    rotate(0); }
    50%      { transform: translateY(-6px) rotate(-1.5deg); }
  }

  .m-meta {
    text-align: center;
    color: var(--ink-soft);
    font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 700;
    opacity: 0; animation: rise 600ms var(--ease-soft) 380ms forwards;
  }
  .m-title {
    text-align: center;
    font-size: 28px; font-weight: 800;
    margin-top: 6px;
    color: var(--ink); letter-spacing: -0.01em;
    opacity: 0; transform: translateY(8px);
    animation: rise 600ms var(--ease-soft) 480ms forwards;
  }
  .m-title .trophy { font-size: 1em; line-height: 1; vertical-align: baseline; margin-left: 4px; }
  .m-divider {
    width: 40px; height: 3px; background: var(--accent);
    margin: 14px auto 14px;
    border-radius: 999px;
    opacity: 0; animation: rise 600ms var(--ease-soft) 580ms forwards;
  }
  .m-desc {
    text-align: center; color: var(--ink-soft);
    line-height: 1.7;
    font-size: 14px;
    max-width: 420px; margin: 0 auto;
    opacity: 0; transform: translateY(8px);
    animation: rise 600ms var(--ease-soft) 680ms forwards;
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .m-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin: 22px 0 4px;
  }
  .m-stat {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 8px; text-align: center;
    opacity: 0; transform: translateY(8px);
    animation: rise 600ms var(--ease-soft) forwards;
  }
  .m-stat:nth-child(1) { animation-delay: 800ms; }
  .m-stat:nth-child(2) { animation-delay: 880ms; }
  .m-stat:nth-child(3) { animation-delay: 960ms; }
  .m-stat .k { color: var(--ink-mute); font-size: 10px; letter-spacing: 0.20em; text-transform: uppercase; font-weight: 700; }
  .m-stat .v { font-size: 20px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; color: var(--ink); }

  .criteria { margin-top: 24px; }
  .criteria h3 {
    font-size: 11px; color: var(--ink-soft);
    margin-bottom: 12px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
  }
  .criteria ul { padding: 0; margin: 0; list-style: none; }
  .criteria li {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 14px;
    margin-bottom: 8px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    font-size: 14px;
    color: var(--ink-soft); line-height: 1.55;
    opacity: 0; transform: translateY(6px);
    animation: rise 500ms var(--ease-soft) forwards;
  }
  .criteria li:nth-child(1) { animation-delay: 1040ms; }
  .criteria li:nth-child(2) { animation-delay: 1140ms; }
  .criteria li:nth-child(3) { animation-delay: 1240ms; }
  .criteria li:nth-child(4) { animation-delay: 1340ms; }
  .criteria li:nth-child(5) { animation-delay: 1440ms; }
  .criteria li .num {
    flex: none;
    width: 22px; height: 22px; border-radius: 7px;
    background: var(--ink); color: #fff;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .criteria li.done { background: #eaf6ec; border-color: #b8e0bf; }
  .criteria li.done .num { background: #2d8a3d; }

  .actions { display: flex; gap: 10px; margin-top: 24px; opacity: 0; animation: rise 600ms var(--ease-soft) 1560ms forwards; }
  .btn {
    flex: 1; padding: 12px 18px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--paper); color: var(--ink);
    font-size: 13.5px; font-weight: 600;
    transition: background 200ms var(--ease-soft), border-color 200ms var(--ease-soft);
  }
  .btn:hover  { background: var(--bg-tint); border-color: var(--line-strong); }
  .btn:active { transform: scale(0.98); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-primary:hover { background: #2a2d35; border-color: #2a2d35; }

  .close {
    position: absolute; top: 16px; right: 16px;
    width: 36px; height: 36px; border-radius: 12px;
    background: var(--bg); color: var(--ink-soft); border: 1px solid var(--line);
    display: grid; place-items: center;
    transition: background 200ms var(--ease-soft), color 200ms var(--ease-soft), transform 200ms var(--ease-soft);
  }
  .close:hover  { background: var(--bg-tint); color: var(--ink); transform: rotate(90deg); }
  .close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(8px);
    background: var(--ink); color: #fff; padding: 11px 22px;
    border-radius: 12px;
    font-size: 13px; font-weight: 500; z-index: 200;
    box-shadow: var(--shadow-lg);
    opacity: 0; transition: opacity 240ms var(--ease-soft), transform 240ms var(--ease-soft);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }

  @media (max-width: 1080px) { .grid { grid-template-columns: repeat(5, minmax(0, 1fr)); grid-template-rows: repeat(2, 1fr); gap: 6px 4px; } }
  @media (max-width: 880px)  { .grid { grid-template-columns: repeat(5, minmax(0, 1fr)); grid-template-rows: repeat(2, 1fr); gap: 6px 4px; } .stats { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  {
    .grid { grid-template-columns: repeat(5, minmax(0, 1fr)); grid-template-rows: repeat(2, 1fr); gap: 6px 4px; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .search { flex: 1 1 auto; }
    .shell { padding: 0 8px; height: 315px; }
    .header { flex-direction: column; align-items: flex-start; }
    .modal { padding: 32px 22px 22px; }
    .m-title { font-size: 24px; }
    .stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div class="bg" aria-hidden="true"></div>
  <div class="floating" aria-hidden="true">
    <span>✦</span><span>✿</span><span>★</span><span>✿</span><span>✦</span><span>★</span><span>✿</span>
  </div>

  <main class="shell" id="main">
    <header class="header">
      <div class="header-left">
        <span class="eyebrow">Hall of Honors</span>
        <h1 class="title">我的勋章<span class="count" id="ownedCount">7 / 10</span></h1>
        <p class="subtitle">记录每一次小小的坚持,让努力变成看得见的勋章 <span class="hand">✿</span></p>
      </div>
    </header>

    <section class="stats" aria-label="勋章概览">
      <div class="stat">
        <div class="glyph s1" aria-hidden="true">🏅</div>
        <div class="label">Earned</div>
        <div class="value" id="stat-owned">7<span class="unit">/ 10</span></div>
      </div>
      <div class="stat">
        <div class="glyph s2" aria-hidden="true">★</div>
        <div class="label">Total Points</div>
        <div class="value" id="stat-points">880</div>
      </div>
      <div class="stat">
        <div class="glyph s3" aria-hidden="true">✦</div>
        <div class="label">Top Honor</div>
        <div class="value" id="stat-rank" style="font-size:18px">知识探索者</div>
      </div>
      <div class="stat">
        <div class="glyph s4" aria-hidden="true">↗</div>
        <div class="label">Next Goal</div>
        <div class="value" id="stat-next" style="font-size:18px">图灵之光</div>
      </div>
    </section>

    <div class="toolbar">
      <div class="tabs" role="tablist" aria-label="勋章分类">
        <button class="tab" role="tab" aria-selected="true"  data-filter="all">全部</button>
        <button class="tab" role="tab" aria-selected="false" data-filter="learning">学习成就</button>
        <button class="tab" role="tab" aria-selected="false" data-filter="rank">段位勋章</button>
        <button class="tab" role="tab" aria-selected="false" data-filter="locked">未解锁</button>
      </div>
      <label class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input type="search" id="search" placeholder="Search…" aria-label="搜索勋章" autocomplete="off" />
      </label>
    </div>

    <section class="grid" id="grid" aria-label="勋章列表"></section>

    <div class="empty" id="empty" aria-live="polite">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9 9h.01M15 9h.01M8.5 15.5c1-.8 2.2-1.2 3.5-1.2s2.5.4 3.5 1.2"/></svg>
      <p style="margin-top:10px">没有匹配的勋章</p>
    </div>
  </main>

    /* =========================================================

    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const tabs = document.querySelectorAll(".tab");
    const search = document.getElementById("search");

    function makeMedalSVG(m) {
      return `<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" class="medal-svg">${ROUGH}${hexFrame()}${m.ill()}</svg>`;
    }

    function render(list) {
      grid.innerHTML = "";
      if (!list.length) { empty.dataset.show = "true"; return; }
      empty.dataset.show = "false";
      const frag = document.createDocumentFragment();
      list.forEach((m) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "card";
        card.dataset.id = m.id;
        card.dataset.locked = String(!m.owned);
        card.setAttribute("aria-label",
          `${m.name},${m.owned ? "已获得" : "未解锁"},${m.rarity}勋章,价值${m.points}积分`);

        const inner = `
          <div class="medal-wrap">${makeMedalSVG(m)}</div>
          <div class="name">${m.name}</div>
          <div class="progress-row">
            <div class="progress-text"><span class="cur">${m.progress ?? m.total ?? 0}</span><span class="slash">/</span>${m.total ?? m.progress ?? 0}</div>
          </div>
          <div class="medal-rule">${m.criteria[0]}</div>
        `;
        card.innerHTML = inner;
        card.addEventListener("click", () => {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({
              type: "pc-open-medal-modal",
              medal: {
                name: m.name,
                owned: m.owned,
                desc: m.desc,
                svg: makeMedalSVG(m)
              }
            }, "*");
          } else {
            openModal(m);
          }
        });
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    }

    function applyFilter() {
      const f = document.querySelector(".tab[aria-selected='true']").dataset.filter;
      const q = search.value.trim().toLowerCase();
      let list = medals.slice();
      if (f === "learning") list = list.filter(m => m.category === "learning");
      else if (f === "rank")   list = list.filter(m => m.category === "rank");
      else if (f === "locked") list = list.filter(m => !m.owned);
      if (q) list = list.filter(m => m.name.toLowerCase().includes(q));
      render(list);
    }
    tabs.forEach(t => t.addEventListener("click", () => {
      tabs.forEach(x => x.setAttribute("aria-selected", "false"));
      t.setAttribute("aria-selected", "true");
      applyFilter();
    }));

      document.getElementById("m-points").textContent = m.points;
      document.getElementById("m-rarity").textContent = m.rarity;
      document.getElementById("m-status").textContent = m.owned ? "已获得" : `${m.progress}/${m.total}`;

      const list = document.getElementById("m-criteria");
      list.innerHTML = "";
      m.criteria.forEach((c, i) => {
        const li = document.createElement("li");
        if (m.owned) li.className = "done";
        const num = String(i + 1).padStart(2, "0");
        li.innerHTML = `<span class="num">${num}</span><span>${c}</span>`;
        list.appendChild(li);
      });

      [...modal.querySelectorAll(".m-meta, .m-title, .m-desc, .medal-stage .medal-svg")].forEach(el => {
        el.style.animation = "none"; void el.offsetWidth; el.style.animation = "";
      });

      lastFocus.el = document.activeElement;
      modalRoot.dataset.open = "true";
      modalRoot.querySelector(".close").focus();
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      modalRoot.dataset.open = "false";
      document.body.style.overflow = "";
      if (lastFocus.el && lastFocus.el.focus) lastFocus.el.focus();
    }
    modalRoot.addEventListener("click", (e) => {
      if (e.target.closest("[data-close]")) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (modalRoot.dataset.open === "true" && e.key === "Escape") closeModal();
    });

    document.getElementById("m-share").addEventListener("click", async () => {
      if (!currentMedal) return;
      const text = `我${currentMedal.owned ? "已获得" : "正在解锁"}「${currentMedal.name}」勋章 ✨ Hall of Honors`;
      if (navigator.share) {
        try { await navigator.share({ title: "我的勋章", text }); }
        catch (_) { /* user cancelled */ }
      } else if (navigator.clipboard) {
        try { await navigator.clipboard.writeText(text); showToast("已复制分享文案 ✨"); }
        catch (_) { showToast(text); }
      } else {
        showToast(text);
      }
    });

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => t.classList.remove("show"), 1800);
    }

    function syncFromOverview(overview) {
      if (!overview) return;
      const byId = {
        streak: overview.medals?.module?.find(x => x.type === "streak"),
        terminator: overview.medals?.module?.find(x => x.type === "mistake"),
        explorer: overview.medals?.module?.find(x => x.type === "mastery"),
        asker: overview.medals?.module?.find(x => x.type === "qa"),
        noter: overview.medals?.module?.find(x => x.type === "note"),
        bronze: overview.medals?.points?.find(x => x.type === "point_bronze"),
        silver: overview.medals?.points?.find(x => x.type === "point_silver"),
        gold: overview.medals?.points?.find(x => x.type === "point_gold"),
        diamond: overview.medals?.points?.find(x => x.type === "point_diamond"),
        turing: overview.medals?.points?.find(x => x.type === "point_turing")
      };
      medals.forEach(m => {
        const data = byId[m.id];
        if (!data) return;
        m.owned = !!data.unlocked;
        m.progress = Number(data.current || 0);
        m.total = Number(data.target || 0);
        if (m.owned) m.date = (data.achieved_at || new Date().toISOString().slice(0, 10)).replaceAll("-", ".");
      });
      const owned = medals.filter(m => m.owned);
      const points = Number(overview.account?.total_earned || 0);
      document.getElementById("stat-owned").innerHTML = `${owned.length}<span class="unit">/ ${medals.length}</span>`;
      document.getElementById("stat-points").textContent = new Intl.NumberFormat("zh-CN").format(points);
      document.getElementById("stat-rank").textContent = owned.at(-1)?.name || "暂未获得";
      document.getElementById("stat-next").textContent = medals.find(m => !m.owned)?.name || "已封顶";
      document.getElementById("ownedCount").textContent = `${owned.length} / ${medals.length}`;
      render(medals);
    }

    window.addEventListener("message", (event) => {
      if (event.data?.type === "pc-medals-overview") syncFromOverview(event.data.overview);
    });

    render(medals);
  </script>
</body>
</html>
